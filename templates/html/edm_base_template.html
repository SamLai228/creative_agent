<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDM</title>
    <style>
        body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
        table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
        img { -ms-interpolation-mode: bicubic; border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
        table { border-collapse: collapse !important; }
        body {
            height: 100% !important;
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
            font-family: 'PingFang TC', 'Microsoft JhengHei', Arial, sans-serif;
            background-color: #e8f5e9;
        }

        @media screen and (max-width: 600px) {
            .container { width: 100% !important; border-radius: 0 !important; }
            .hero-title { font-size: 24px !important; }
        }

        .card {
            background-color: #ffffff;
            border-radius: 25px;
            padding: 30px 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        .main-btn {
            background: linear-gradient(to right, #76c893, #52b69a);
            color: #ffffff !important;
            padding: 12px 35px;
            text-decoration: none;
            border-radius: 30px;
            display: inline-block;
            font-weight: bold;
            font-size: 18px;
            margin-top: 15px;
        }
        .product-btn {
            background-color: #76c893;
            color: #ffffff !important;
            padding: 15px 20px;
            text-decoration: none;
            border-radius: 15px;
            display: block;
            font-weight: bold;
            font-size: 16px;
            text-align: left;
            position: relative;
        }
        .consult-btn {
            background-color: #a3d9a5;
            color: #ffffff !important;
            padding: 10px 25px;
            text-decoration: none;
            border-radius: 25px;
            display: inline-block;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <table border="0" cellpadding="0" cellspacing="0" width="100%" style="background: linear-gradient(180deg, #f1f8f4 0%, #d7ece0 100%);">
        <tr>
            <td align="center" style="padding: 20px 0;">
                <table border="0" cellpadding="0" cellspacing="0" width="500" class="container">

                    <!-- Header Section -->
                    <tr>
                        <td align="center" style="padding: 20px;">
                            <h1 style="color: #333; margin: 0; font-size: 28px; line-height: 1.4;">
                                {{title}}<br>
                                <span style="font-size: 24px; color: #444;">{{title_2}}</span>
                            </h1>
                        </td>
                    </tr>

                    <!-- Character Section -->
                    {{character_section}}

                    <!-- Card 1: 數據與痛點 -->
                    <tr>
                        <td style="padding: 0 20px;">
                            <div class="card">
                                <p style="font-size: 18px; line-height: 1.6; color: #555; margin: 0;">
                                    {{content}}<br>
                                    {{content_2}}<br>
                                    {{content_3}}
                                </p>
                            </div>
                        </td>
                    </tr>

                    <!-- Card 2: 解決方案 -->
                    <tr>
                        <td style="padding: 0 20px;">
                            <div class="card">
                                <div style="border: 2px solid #76c893; border-radius: 25px; display: inline-block; padding: 5px 20px; margin-bottom: 15px;">
                                    <h3 style="margin: 0; color: #333; font-size: 18px;">{{content_4}}</h3>
                                </div>
                                <p style="font-size: 16px; line-height: 1.6; color: #666;">
                                    {{content_5}}<br>
                                    {{content_6}}<br>
                                    {{content_7}}
                                </p>
                                <a href="#" class="main-btn">{{cta}} &gt;</a>
                            </div>
                        </td>
                    </tr>

                    <!-- Product Section -->
                    <tr>
                        <td style="padding: 20px;">
                            <table border="0" cellpadding="0" cellspacing="0" width="100%">
                                <tr>
                                    <td width="80" valign="middle">
                                        <div style="font-size: 50px;">🧰</div>
                                    </td>
                                    <td valign="middle">
                                        <p style="margin: 0 0 10px 0; color: #333; font-weight: bold;">{{product_intro}}</p>
                                        <a href="#" class="product-btn">
                                            {{product_name}}
                                            <span style="float: right;">&gt;</span>
                                        </a>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- Footer Section -->
                    <tr>
                        <td style="padding: 40px 20px; background: linear-gradient(0deg, #a3d9a5 0%, rgba(163,217,165,0) 100%);">
                            <table border="0" cellpadding="0" cellspacing="0" width="100%">
                                <tr>
                                    <td width="60%">
                                        <p style="font-size: 18px; font-weight: bold; color: #2d5a3f; line-height: 1.5; margin: 0;">
                                            {{content_8}}<br>
                                            {{content_9}}<br>
                                            {{content_10}}
                                        </p>
                                    </td>
                                    <td width="40%" align="right">
                                        <a href="#" class="consult-btn">{{cta_2}} &gt;</a>
                                        <p style="font-size: 12px; color: #555; margin-top: 10px;">{{conclusion}}</p>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                </table>
            </td>
        </tr>
    </table>
</body>
</html>
