<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EDM</title>
</head>
<body style="margin:0; padding:0; background:#f3f6f5; font-family:'PingFang TC','Noto Sans TC','Microsoft JhengHei',sans-serif; color:#1f2a2a;">
  <div style="width:600px; margin:0 auto; background:#ffffff;">

    <!-- Top hero (mint background) -->
    <div style="background:linear-gradient(180deg,#e9f6f0 0%, #e2f2ea 55%, #ffffff 100%); padding:34px 36px 22px 36px;">
      <div style="display:inline-block; background:rgba(255,255,255,0.0);">
        <div style="font-size:34px; font-weight:900; letter-spacing:0.5px; line-height:1.25; color:#1c2b2b;">
          一個人也能活得安心：
        </div>
        <div style="font-size:34px; font-weight:900; letter-spacing:0.5px; line-height:1.25; margin-top:8px; color:#1c2b2b;">
          醫療與老後準備指南
        </div>
      </div>
    </div>

    <!-- White rounded card with paragraph -->
    <div style="background:linear-gradient(180deg,#ffffff 0%, #f6fbf8 100%); padding:0 36px 18px 36px;">
      <div style="background:#ffffff; border-radius:22px; padding:22px 22px; box-shadow:0 10px 24px rgba(26,78,62,0.08); border:1px solid rgba(136,188,166,0.25);">
        <div style="font-size:18px; line-height:1.85; color:#4b5a59; text-align:center;">
          全台已有超過 600 萬人是單身生活，<br/>
          但你想過嗎？若有一天需要動手術或住院，<br/>
          誰能幫你簽同意書？醫療費從哪來？
        </div>
      </div>

      <!-- Question pill -->
      <div style="margin-top:18px; display:flex; justify-content:center;">
        <div style="background:#ffffff; border:2px solid #7ac6a7; color:#1f2a2a; border-radius:999px; padding:14px 22px; font-size:18px; font-weight:800; letter-spacing:0.2px;">
          一個人動手術前該準備什麼？
        </div>
      </div>

      <!-- Supporting text -->
      <div style="margin-top:14px; text-align:center; color:#5a6b69; font-size:16px; line-height:1.85;">
        不只談手術準備，<br/>
        還帶你思考未來的醫療照護與長期保障，<br/>
        讓「一個人生活」也能擁有完整後盾。
      </div>

      <!-- CTA button -->
      <div style="margin-top:16px; display:flex; justify-content:center;">
        <a href="#" style="display:inline-block; background:#7ac6a7; color:#ffffff; text-decoration:none; padding:14px 26px; border-radius:14px; font-size:18px; font-weight:800; letter-spacing:0.5px; box-shadow:0 10px 18px rgba(36,120,89,0.20);">
          立即閱讀完整文章 &gt;
        </a>
      </div>
    </div>

    <!-- Product strip -->
    <div style="background:linear-gradient(180deg,#ffffff 0%, #f0fbf5 100%); padding:18px 36px 22px 36px;">
      <div style="text-align:center; font-size:18px; font-weight:800; color:#3f5654; margin-bottom:14px;">
        也許適合你的醫療保障…
      </div>

      <div style="display:flex; justify-content:center;">
        <div style="background:#7ac6a7; border-radius:16px; padding:14px 18px; width:100%; max-width:520px; box-shadow:0 10px 20px rgba(36,120,89,0.18);">
          <div style="display:flex; align-items:center; justify-content:space-between; gap:12px;">
            <div style="color:#ffffff; line-height:1.35;">
              <div style="font-size:18px; font-weight:900; letter-spacing:0.3px;">
                新iHealth一年期住院
              </div>
              <div style="font-size:16px; font-weight:800; opacity:0.95; margin-top:4px;">
                醫療健康保險(外溢型)
              </div>
            </div>
            <div style="color:#ffffff; font-size:22px; font-weight:900; opacity:0.95; padding:0 6px;">
              &gt;
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Bottom mint section with consultation -->
    <div style="background:linear-gradient(180deg,#e9f6f0 0%, #e2f2ea 70%, #dff1e8 100%); padding:26px 36px 34px 36px;">
      <div style="display:flex; align-items:flex-end; justify-content:space-between; gap:18px;">
        <div style="flex:1;">
          <div style="font-size:22px; font-weight:900; line-height:1.45; color:#1c2b2b;">
            醫療準備做得越早，<br/>
            當那一天真的來臨，<br/>
            你會感謝現在的自己。
          </div>
        </div>

        <div style="width:210px; text-align:right;">
          <a href="#" style="display:inline-block; background:#7ac6a7; color:#ffffff; text-decoration:none; padding:12px 18px; border-radius:14px; font-size:18px; font-weight:900; letter-spacing:0.3px; box-shadow:0 10px 18px rgba(36,120,89,0.20);">
            點我諮詢 &gt;
          </a>
          <div style="margin-top:10px; font-size:14px; color:#5a6b69; line-height:1.5;">
            疑難雜症都可以找顧問
          </div>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
